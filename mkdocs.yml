site_name: Helios
site_description: Open-source graph visualization and WebAssembly-backed network data tools.
site_url: https://heliosweb.io/docs/
edit_uri: ""
docs_dir: docs
site_dir: site/docs
strict: true
not_in_nav: |
  examples/behaviors.md
  examples/persistence-save-restore.md
  api/helios-web/*.md
  api/helios-network-js-wasm/*.md
  api/helios-network-python/*.md
  api/helios-network-native-c/*.md

theme:
  name: material
  language: en
  logo: assets/helios-logo.svg
  favicon: assets/helios-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - sidecode:
      import_map:
        helios-web: ../vendor/helios/helios-web.es.js
        helios-network: ../vendor/helios/helios-network.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/helios.css

extra_javascript:
  - assets/javascripts/api-search.js

extra:
  homepage: https://heliosweb.io/
  version:
    default: "0.10.9"
  helios:
    docs_channel: "0.10.9"
    public_urls:
      landing: https://heliosweb.io/
      app: https://heliosweb.io/app/
      docs: https://heliosweb.io/docs/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/filipinascimento/heliosweb.io

nav:
  - Overview: index.md
  - Getting Started:
      - Overview: getting-started/index.md
