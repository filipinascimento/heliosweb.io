name: Deploy Pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Python dependencies
        run: python -m pip install --upgrade -r requirements.txt

      - name: Install released Helios packages
        run: |
          npm install || {
            echo "::warning::Released Helios packages are not available yet; using committed vendor bundles and release-branch sources."
            git clone --depth 1 --branch release/0.10.0 https://github.com/filipinascimento/helios-network.git ../helios-network-v2
            git clone --depth 1 --branch main https://github.com/filipinascimento/helios-web.git ../helios-web-next
          }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: python scripts/build_docs.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
